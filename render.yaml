services:
  - type: web
    name: pruefungsnavigator-evaluation
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: pruefungsnavigator-evaluation-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: TEACHER_DASHBOARD_PASSWORD
        sync: false
      - key: NAVIGATOR_URL
        value: https://patrickfischerksa.github.io/pruefungsnavigator/
